name: Deploy to GitHub Pages

on:
  push:
    branches: [main]  # or your default branch
  workflow_dispatch:  # allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build SvelteKit site
        run: bun run build
      
      - name: Deploy to microngame/microngame.github.io
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: microngame/microngame.github.io
          publish_branch: main  # or master, depending on target repo
          publish_dir: ./build  # SvelteKit's default static output
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'